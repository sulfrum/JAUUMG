<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dungeon Frame Test</title>
  <style>
    body { background: #0d0d0d; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
    canvas { border: 2px solid #444; border-radius: 4px; }
    p { color: #555; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <canvas id="c" width="600" height="400"></canvas>
  <p id="info"></p>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const TILE = 20;
    const COLS = W / TILE, ROWS = H / TILE;

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const isWall = r === 0 || r === ROWS-1 || c === 0 || c === COLS-1;
          ctx.fillStyle = isWall ? '#888' : '#1a1a2e';
          ctx.fillRect(c * TILE + 1, r * TILE + 1, TILE - 2, TILE - 2);
        }
      }
    }

    document.getElementById('info').textContent = `${COLS} × ${ROWS} celle  |  tile ${TILE}px`;
    draw();
  </script>
</body>
</html>
