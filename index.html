<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>JAUUMG</title>
  <style>
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      color: #aaa;
    }
    canvas {
      border: 2px solid #333;
      border-radius: 4px;
    }
    #info {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }
    #controls {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
  font-size: 12px;
}

#controls label {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

#controls input {
  width: 70px;
  background: #111;
  color: #aaa;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 4px;
  font-family: monospace;
}

#controls button {
  align-self: flex-end;
  background: #222;
  color: #aaa;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 5px 10px;
  font-family: monospace;
  cursor: pointer;
}

#controls button:hover {
  background: #333;
}
  </style>
</head>
<body>

<div id="controls">
  <label>
    Columns
    <input id="colsInput" type="number" value="40" min="5" max="100" step="1">
  </label>

  <label>
    Rows
    <input id="rowsInput" type="number" value="25" min="5" max="100" step="1">
  </label>

  <label>
    Rooms
    <input id="roomsInput" type="number" value="8" min="1" max="50" step="1">
  </label>

  <label>
    Tile size
    <input id="tileInput" type="number" value="20" min="4" max="40" step="1">
  </label>

  <button id="generateBtn">Generate</button>
</div>

  <canvas id="c"></canvas>
  <div id="info"></div>
	
	js/utils.js
	js/room.js
	js/dungeon.js
	js/renderer.js
	js/main.js
  
</body>
</html>
