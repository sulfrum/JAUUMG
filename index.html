<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>JAUUMG</title>
  <style>
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      color: #aaa;
    }
    canvas {
      border: 2px solid #333;
      border-radius: 4px;
    }
    #info {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }
    #controls {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
  font-size: 12px;
}

#controls label {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

#controls input {
  width: 70px;
  background: #111;
  color: #aaa;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 4px;
  font-family: monospace;
}

#controls button {
  align-self: flex-end;
  background: #222;
  color: #aaa;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 5px 10px;
  font-family: monospace;
  cursor: pointer;
}

#controls button:hover {
  background: #333;
}
  </style>
</head>
<body>

<div id="controls">
  <label>
    Columns
    <input id="colsInput" type="number" value="40" min="5" max="100" step="1">
  </label>

  <label>
    Rows
    <input id="rowsInput" type="number" value="25" min="5" max="100" step="1">
  </label>

  <label>
    Rooms
    <input id="roomsInput" type="number" value="8" min="1" max="50" step="1">
  </label>

  <label>
    Tile size
    <input id="tileInput" type="number" value="20" min="4" max="40" step="1">
  </label>

  <button id="generateBtn">Generate</button>
</div>

  <canvas id="c"></canvas>
  <div id="info"></div>

  <script>

    // -------------------------------------------------------
    // funzioni globali
    // -------------------------------------------------------

    function getRandomInt(min, max) {
      const minCeiled = Math.ceil(min);
      const maxFloored = Math.floor(max);
      return Math.floor(Math.random() * (maxFloored - minCeiled) + minCeiled); // The maximum is exclusive and the minimum is inclusive
    }
    

    function getClampedInt(inputId, min, max, fallback) {
      const input = document.getElementById(inputId);
      let value = Number(input.value);

      if (!Number.isFinite(value)) {
        value = fallback;
      }

      value = Math.floor(value);
      value = Math.max(min, Math.min(max, value));

      input.value = value;

      return value;
    }   

    // -------------------------------------------------------
    // Room: struttura dati delle singole stanze
    // -------------------------------------------------------
    class Room  {
      constructor(x, y, w, h) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
      }
      
	  center() {
	    return {
		  x: Math.floor(this.x + this.w / 2),
		  y: Math.floor(this.y + this.h / 2)
	    };
      }	  
	  
      intersects( otherRoom ){
        return (
           this.x < otherRoom.x + otherRoom.w +1 &&
           this.x + this.w +1 > otherRoom.x &&
           this.y < otherRoom.y + otherRoom.h +1 &&
           this.y + this.h +1 > otherRoom.y
        );
      }
      
    }

    // -------------------------------------------------------
    // Dungeon: struttura dati della mappa
    // -------------------------------------------------------
    
    class Dungeon {
      constructor(cols, rows) {
        this.cols = cols;
        this.rows = rows;
        this.grid = Array.from({ length: rows }, () => new Array(cols).fill(1));
        this.rooms = []
      }

      setTile(x, y, value) {
        if (this.inBounds(x, y)) this.grid[y][x] = value;
      }

      getTile(x, y) {
        if (!this.inBounds(x, y)) return 1; // fuori bounds = muro
        return this.grid[y][x];
      }

      inBounds(x, y) {
        return x >= 0 && x < this.cols && y >= 0 && y < this.rows;
      }

      // scava un rettangolo di pavimento
      carveRect(x, y, w, h) {
        for (let row = y; row < y + h; row++) {
          for (let col = x; col < x + w; col++) {
            this.setTile(col, row, 0);
          }
        }
      }
 
      carveHorizontalCorridor(x1, x2, y) {
        const start = Math.min(x1, x2);
        const end = Math.max(x1, x2);

        for (let x = start; x <= end; x++) {
          this.setTile(x, y, 0);
        }
      }

      carveVerticalCorridor(y1, y2, x) {
        const start = Math.min(y1, y2);
        const end = Math.max(y1, y2);

        for (let y = start; y <= end; y++) {
          this.setTile(x, y, 0);
        }
	  }

       

      createRooms(num) {
        const minW = 2;
        
        const maxW = Math.floor(this.cols / 2);
        const minH = 2;
        const maxH = Math.floor(this.rows / 2);

        const maxAttempts = num * 20;
        let attempts = 0;

        while (this.rooms.length < num && attempts < maxAttempts) {
          attempts++;

          const w = getRandomInt(minW, maxW + 1);
          const h = getRandomInt(minH, maxH + 1);

          const x = getRandomInt(1, this.cols - w);
          const y = getRandomInt(1, this.rows - h);

          const newRoom = new Room(x, y, w, h);

          let overlaps = false;

          for (const room of this.rooms) {
            if (newRoom.intersects(room)) {
              overlaps = true;
              break;
            }
          }

          if (!overlaps) {
            this.rooms.push(newRoom);
            this.carveRect(newRoom.x, newRoom.y, newRoom.w, newRoom.h);
          }
        } 

		
		
        return {
          roomsCreated: this.rooms.length,
          attempts: attempts,
          maxAttempts: maxAttempts,
          rooms: this.rooms
        };
    }
	
	connectRoomsLD(roomA, roomB) {
			const centerA = roomA.center();
			const centerB = roomB.center();
			
			
			this.carveHorizontalCorridor(centerA.x, centerB.x, centerA.y);
			this.carveVerticalCorridor(centerA.y, centerB.y, centerB.x);
		}

	connectRoomsDL(roomA, roomB) {
			const centerA = roomA.center();
			const centerB = roomB.center();
			
			this.carveVerticalCorridor(centerA.y, centerB.y, centerA.x);
			this.carveHorizontalCorridor(centerA.x, centerB.x, centerB.y);
		}
	
	connectAllRooms() {
	  const sortedRooms = [...this.rooms].sort((a, b) => a.x - b.x);

	  for (let i = 0; i < sortedRooms.length - 1; i++) {
		const useLD = getRandomInt(0,2) === 0;
		if (useLD) {
          this.connectRoomsLD(sortedRooms[i], sortedRooms[i + 1]);
		} else {
		  this.connectRoomsDL(sortedRooms[i], sortedRooms[i + 1]);
		}
	  }
	}	
	
	}


    // -------------------------------------------------------
    // Renderer: disegna il Dungeon sul canvas
    // -------------------------------------------------------
    class Renderer {
      constructor(canvas, dungeon, tileSize = 20) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.dungeon = dungeon;
        this.tileSize = tileSize;

        this.canvas.width  = dungeon.cols * tileSize;
        this.canvas.height = dungeon.rows * tileSize;

        this.colors = {
          0: '#555566', // pavimento
          1: '#1a1a2e', // muro
        };
      }

      draw() {
        const { ctx, dungeon, tileSize, colors } = this;
        const T = tileSize;

        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        for (let row = 0; row < dungeon.rows; row++) {
          for (let col = 0; col < dungeon.cols; col++) {
            const tile = dungeon.getTile(col, row);
            ctx.fillStyle = colors[tile] ?? '#ff0000';
            ctx.fillRect(col * T + 1, row * T + 1, T - 2, T - 2);
          }
        }
      }
    }

    // -------------------------------------------------------
    // Main
    // -------------------------------------------------------
    

    
    
    function generateDungeon() {
      const cols = getClampedInt('colsInput', 5, 100, 40);
      const rows = getClampedInt('rowsInput', 5, 100, 25);
      const numRooms = getClampedInt('roomsInput', 1, 50, 8);
      const tile = getClampedInt('tileInput', 4, 40, 20);

      const dungeon = new Dungeon(cols, rows);
      const result = dungeon.createRooms(numRooms);
	  //dungeon.connectRooms(result.rooms[0], result.rooms[1]);
      dungeon.connectAllRooms();

      const canvas = document.getElementById('c');
      const renderer = new Renderer(canvas, dungeon, tile);
      renderer.draw();

      document.getElementById('info').textContent =
        `${cols}×${rows} cells | tile ${tile}px | rooms ${result.roomsCreated}/${numRooms} | attemts ${result.attempts}/${result.maxAttempts}`;
    }

    document.getElementById('generateBtn').addEventListener('click', generateDungeon);

    generateDungeon();


  </script>
</body>
</html>
